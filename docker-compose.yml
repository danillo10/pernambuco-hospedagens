services:
  postgres:
    image: postgres:16-alpine
    container_name: pernambuco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pernambuco
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pernambuco_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pernambuco"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pernambuco_postgres_data:
